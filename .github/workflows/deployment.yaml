name: Deploy Wellness Connect API to AKS

on:
   push:
      branches: ["develop"]

env:
   AZURE_CONTAINER_REGISTRY: "azrdcrapps01"
   RESOURCE_GROUP: "azrdrgapps01"
   CLUSTER_NAME: "azrdksapps01"
   NAMESPACE: "external-deployments"
   IMAGE_NAME: "wellness-connect-api"
   AZURE_SUBSCRIPTION_ID: "f8fa6be4-79ea-493e-a75a-b7a2da13a8a9"
   AZURE_CLIENT_ID: "3212ce9d-feae-49b6-800d-2e4f3dc5279c"
   TENANT_ID: "329e91b0-e21f-48fb-a071-456717ecc28e"

jobs:
   build-image:
      runs-on: ubuntu-latest
      permissions:
         contents: read
         id-token: write
      steps:
         - uses: actions/checkout@v4

         - name: Generate cache  key
           id: cache-key
           run: |
              # Hash requirements file for dependency changes
              DEPS_HASH=$(cat requirements.txt | sha256sum | cut -d' ' -f1 | cut -c1-8)

              # Hash Python source code for code changes
              CODE_HASH=$(find . -type f -name "*.py" 2>/dev/null | sort | xargs cat | sha256sum | cut -d' ' -f1 | cut -c1-8)

              # Hash Dockerfile
              DOCKER_HASH=$(cat Dockerfile | sha256sum | cut -d' ' -f1 | cut -c1-8)

              # Combine hashes
              CACHE_KEY="${DEPS_HASH}-${CODE_HASH}-${DOCKER_HASH}"
              echo "cache-key=${CACHE_KEY}" >> $GITHUB_OUTPUT
              echo "Cache key: ${CACHE_KEY}"

         - uses: azure/login@v1
           with:
              client-id: ${{ env.AZURE_CLIENT_ID }}
              tenant-id: ${{ env.TENANT_ID }}
              subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

         - name: Set up Docker Buildx
           uses: docker/setup-buildx-action@v3

         - name: Login to ACR
           run: |
              az acr login --name ${{ env.AZURE_CONTAINER_REGISTRY }}

         - name: Build and Push Image with Layer Caching
           uses: docker/build-push-action@v6
           with:
              context: .
              file: Dockerfile
              push: true
              pull: true
              tags: |
                 ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
              cache-from: |
                 type=registry,ref=${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:buildcache-${{ steps.cache-key.outputs.cache-key }}
                 type=registry,ref=${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:buildcache-main
              cache-to: type=registry,ref=${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:buildcache-${{ steps.cache-key.outputs.cache-key }},mode=max

   deploy:
      runs-on: ubuntu-latest
      needs: build-image
      permissions:
         contents: read
         id-token: write
      steps:
         - uses: actions/checkout@v4

         - uses: azure/login@v1
           with:
              client-id: ${{ env.AZURE_CLIENT_ID }}
              tenant-id: ${{ env.TENANT_ID }}
              subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

         - name: Prepare Manifests
           run: |
              # Get ACR Login Server
              ACR_LOGIN_SERVER=$(az acr show --name ${{ env.AZURE_CONTAINER_REGISTRY }} --resource-group ${{ env.RESOURCE_GROUP }} --query loginServer -o tsv)

              # Replace placeholders in deployment
              sed -i "s|\${ACR_LOGIN_SERVER}|$ACR_LOGIN_SERVER|g; \
                      s|\${IMAGE_NAME}|${{ env.IMAGE_NAME }}|g; \
                      s|\${IMAGE_TAG}|latest|g; \
                      s|\${NAMESPACE}|${{ env.NAMESPACE }}|g" k8s/deployment.yaml

         - name: Prepare Secrets
           run: |
              # Export secrets to environment
              export NAMESPACE="${{ env.NAMESPACE }}"
              export DATABASE_URL="${{ secrets.DATABASE_URL }}"

              # Use bash parameter expansion for literal replacement (preserves all special chars)
              while IFS= read -r line; do 
                  line="${line//\$\{NAMESPACE\}/$NAMESPACE}"
                  line="${line//\$\{DATABASE_URL\}/$DATABASE_URL}"
                  echo "$line"
              done < k8s/secret.yaml > k8s/secret.yaml.tmp
              mv k8s/secret.yaml.tmp k8s/secret.yaml

         - name: Finalize Namespace Configuration
           run: |
              # Replace namespace in remaining files
              for file in k8s/service.yaml k8s/ingress.yaml k8s/network-policy.yaml k8s/hpa.yaml k8s/secret.yaml; do
                if [ -f "$file" ]; then
                  sed -i "s|\${NAMESPACE}|${{ env.NAMESPACE }}|g" "$file"
                fi
              done

         - name: Create Deployment Bundle
           run: |
              cat k8s/secret.yaml > deploy-bundle.yaml
              echo -e "\n---\n" >> deploy-bundle.yaml
              cat k8s/deployment.yaml >> deploy-bundle.yaml
              echo -e "\n---\n" >> deploy-bundle.yaml
              cat k8s/service.yaml >> deploy-bundle.yaml
              echo -e "\n---\n" >> deploy-bundle.yaml
              cat k8s/ingress.yaml >> deploy-bundle.yaml
              echo -e "\n---\n" >> deploy-bundle.yaml
              cat k8s/network-policy.yaml >> deploy-bundle.yaml
              echo -e "\n---\n" >> deploy-bundle.yaml
              cat k8s/hpa.yaml >> deploy-bundle.yaml

         - name: Deploy to AKS
           run: |
              az aks command invoke \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --name ${{ env.CLUSTER_NAME }} \
                --command "kubectl apply -f deploy-bundle.yaml && kubectl rollout status deployment/wellness-connect-api -n ${{ env.NAMESPACE }} --timeout=5m" \
                --file deploy-bundle.yaml

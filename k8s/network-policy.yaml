apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
   name: wellness-connect-api-network-policy
   namespace: ${NAMESPACE}
   labels:
      app: wellness-connect-api
spec:
   podSelector:
      matchLabels:
         app: wellness-connect-api
   policyTypes:
      - Ingress
      - Egress
   ingress:
      - from:
           - namespaceSelector:
                matchLabels:
                   kubernetes.io/metadata.name: ingress-nginx
        ports:
           - protocol: TCP
             port: 8000
      - from:
           - namespaceSelector: {}
             podSelector:
                matchLabels:
                   app.kubernetes.io/name: ingress-nginx
        ports:
           - protocol: TCP
             port: 8000
      - from:
           - podSelector: {}
        ports:
           - protocol: TCP
             port: 8000
   egress:
      - to:
           - namespaceSelector:
                matchLabels:
                   kubernetes.io/metadata.name: kube-system
             podSelector:
                matchLabels:
                   k8s-app: kube-dns
        ports:
           - protocol: UDP
             port: 53
           - protocol: TCP
             port: 53
      - to:
           - ipBlock:
                cidr: 0.0.0.0/0
                except:
                   - 169.254.169.254/32
        ports:
           - protocol: TCP
             port: 5432
      - to:
           - ipBlock:
                cidr: 0.0.0.0/0
                except:
                   - 169.254.169.254/32
        ports:
           - protocol: TCP
             port: 443
      - to:
           - ipBlock:
                cidr: 0.0.0.0/0
                except:
                   - 169.254.169.254/32
        ports:
           - protocol: TCP
             port: 80
      - to:
           - podSelector: {}
        ports:
           - protocol: TCP
             port: 3000
      - to:
           - podSelector:
                matchLabels:
                   app: ugep-api
        ports:
           - protocol: TCP
             port: 8000
           - protocol: TCP
             port: 80
